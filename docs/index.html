<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dreame Каталог</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ... (ваши старые стили остаются без изменений) ... */
        /* Добавьте в конец стилей: */
        .debug-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            color: #00ff00;
            font-family: monospace;
            font-size: 10px;
            padding: 8px;
            z-index: 10000;
            max-height: 150px;
            overflow-y: auto;
            border-top: 2px solid #ffaa00;
            display: none;
        }
        .debug-panel.visible {
            display: block;
        }
        .debug-button {
            position: fixed;
            bottom: 10px;
            right: 10px;
            z-index: 10001;
            background: #ffaa00;
            border: none;
            border-radius: 20px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.7;
        }
        .debug-button:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Панель отладки -->
    <div id="debugPanel" class="debug-panel">
        <div id="debugLog"></div>
    </div>
    <button class="debug-button" onclick="toggleDebug()">🐛 DEBUG</button>

    <div id="toast" class="toast">Запрос отправлен! ✨</div>
    <div id="app">
        <div class="loading">Загрузка...</div>
    </div>

    <script>
        // ================== ОТЛАДКА ==================
        let debugMessages = [];
        
        function debugLog(message, data = null) {
            const timestamp = new Date().toLocaleTimeString();
            const logMsg = `[${timestamp}] ${message}` + (data ? ` ${JSON.stringify(data)}` : '');
            console.log('🔍 DEBUG:', logMsg);
            
            debugMessages.unshift(logMsg);
            if (debugMessages.length > 20) debugMessages.pop();
            
            const logDiv = document.getElementById('debugLog');
            if (logDiv) {
                logDiv.innerHTML = debugMessages.map(msg => `→ ${msg}`).join('<br>');
            }
        }
        
        function toggleDebug() {
            const panel = document.getElementById('debugPanel');
            panel.classList.toggle('visible');
            debugLog('Панель отладки ' + (panel.classList.contains('visible') ? 'открыта' : 'закрыта'));
        }

        // ================== ИНИЦИАЛИЗАЦИЯ ==================
        debugLog('Скрипт загружен');
        
        // Проверяем Telegram WebApp
        if (!window.Telegram || !window.Telegram.WebApp) {
            debugLog('❌ Telegram WebApp не найден!');
        } else {
            debugLog('✅ Telegram WebApp найден');
            debugLog('Версия:', window.Telegram.WebApp.version);
            debugLog('Platform:', window.Telegram.WebApp.platform);
        }

        const tg = window.Telegram?.WebApp;
        
        if (tg) {
            tg.expand();
            debugLog('WebApp развернут');
            
            // Проверяем initData
            debugLog('initData есть:', !!tg.initData);
            if (tg.initData) {
                debugLog('initData длина:', tg.initData.length);
            }
        }

        // ================== ДАННЫЕ ==================
        const categories = {
            "🤖 Роботы-пылесосы": {
                folder: "robots",
                icon: "🤖",
                models: [
                    "F9 Pro",
                    "Серия F10",
                    "F20",
                    "F21",
                    "F21 Plus",
                    "D9 Max",
                    "D9 Max Gen 2",
                    "D9 Plus",
                    "D10 Plus",
                    "D10 Plus Gen 2",
                    "D10s",
                    "D10s Pro & D10s Plus",
                    "Серия D20",
                    "D30 Ultra",
                    "L10s Pro",
                    "L10s Plus & L10s Pro Gen 2",
                    "L10 Ultra & L10 Prime",
                    "L10s Ultra",
                    "L10s Pro Ultra",
                    "L20 Ultra Complete",
                    "L30 Ultra",
                    "L40",
                    "L40 Ultra CE & L40s Ultra",
                    "L40 Ultra AE",
                    "L40s Pro Ultra",
                    "X40 Ultra Complete",
                    "Серия X50",
                    "Matrix10 Ultra",
                    "Aqua10 Ultra Roller Complete"
                ]
            },
            "🔋 Вертикальные пылесосы": {
                folder: "vertical",
                icon: "🔋",
                models: [
                    "U10 & U20",
                    "R10 & R10 Pro",
                    "R10 Pro Aqua",
                    "R10s Essential",
                    "R10s & R10s Pro",
                    "R10s Aqua",
                    "R20 Essential",
                    "R20",
                    "R20 Aqua",
                    "Z10 Station",
                    "Z20 Essential",
                    "Z20 & Z30",
                    "Z20 AC & Z30 AC",
                    "Z40 Station",
                    "E10"
                ]
            },
            "💦 Моющие пылесосы": {
                folder: "wash",
                icon: "💦",
                models: [
                    "G10 & G10 Combo",
                    "G10 Pro",
                    "H11 Core",
                    "H12 & H12 Core",
                    "H12S",
                    "H12S AE",
                    "H12 Pro & H12 Dual",
                    "H12 FlexReach",
                    "H12 Pro FlexReach",
                    "H12 Dual FlexReach",
                    "H13 Pro",
                    "H14 Dual",
                    "H15 Pro Heat"
                ]
            },
            "🌿 Роботы-газонокосилки": {
                folder: "mowers",
                icon: "🌿",
                models: [
                    "A1 Pro"
                ]
            },
            "✨ Техника для ухода": {
                folder: "care",
                icon: "✨",
                models: [
                    "Mini",
                    "Gleam",
                    "Glory",
                    "Glory Mix",
                    "Glory Master",
                    "Pocket",
                    "Pocket Ultra",
                    "Gusto",
                    "Miracle",
                    "Miracle Pro",
                    "Pilot",
                    "Dazzle",
                    "AirStyle",
                    "AirStyle Pro",
                    "AirStyle Pro Hi",
                    "Aero Straight",
                    "Hair Removal",
                    "S7"
                ]
            },
            "🌡️ Климат": {
                folder: "climate",
                icon: "🌡️",
                models: [
                    "PM10 & PM20",
                    "PM30",
                    "H40 & H40 Essential",
                    "AP10",
                    "HT30 Ultra"
                ]
            },
            "🍗 Аэрогрили": {
                folder: "airfry",
                icon: "🍗",
                models: [
                    "AF30"
                ]
            },
            "🏠 Для дома": {
                folder: "home",
                icon: "🏠",
                models: [
                    "S10",
                    "DF10 & DF10 Pro"
                ]
            }
        };

        // Состояние приложения
        let currentView = 'main';
        let currentCategory = null;
        let currentModel = null;
        let searchQuery = '';

        // Подсчет статистики
        const totalCategories = Object.keys(categories).length;
        const totalModels = Object.values(categories).reduce((acc, cat) => acc + cat.models.length, 0);

        // ================== ОТПРАВКА ДАННЫХ ==================
        function requestPDFFromBot(folderName, modelName, modelIndex) {
            debugLog('📤 НАЧАЛО ОТПРАВКИ', {folderName, modelName, modelIndex});
            
            // Показываем уведомление
            showToast('⏳ Отправляю запрос...');
            
            // Проверяем tg
            if (!tg) {
                debugLog('❌ tg не существует!');
                showToast('❌ Ошибка: WebApp не инициализирован');
                return;
            }
            
            // Формируем данные
            const data = {
                action: 'get_pdf',
                folder: folderName,
                model: modelName,
                index: modelIndex,
                timestamp: Date.now()
            };
            
            const jsonData = JSON.stringify(data);
            debugLog('📦 Данные подготовлены:', data);
            debugLog('📦 JSON длина:', jsonData.length);
            
            try {
                // ПРОБУЕМ ОТПРАВИТЬ
                debugLog('📤 Вызываю tg.sendData()...');
                tg.sendData(jsonData);
                debugLog('✅ tg.sendData() выполнен без ошибок');
                
                // Меняем текст кнопки
                const button = document.getElementById('pdfRequestButton');
                if (button) {
                    button.textContent = '✅ Запрос отправлен!';
                    button.classList.add('sent');
                    setTimeout(() => {
                        button.textContent = '📄 Получить PDF в чат';
                        button.classList.remove('sent');
                    }, 2000);
                }
                
                showToast('✨ Запрос отправлен! Проверьте чат');
                
            } catch (error) {
                debugLog('❌ ОШИБКА ПРИ ОТПРАВКЕ:', error.toString());
                showToast('❌ Ошибка: ' + error.message);
            }
            
            debugLog('📤 ОТПРАВКА ЗАВЕРШЕНА');
        }

        // ================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // ================== РЕНДЕРИНГ ==================
        function render() {
            const app = document.getElementById('app');
            
            if (currentView === 'main') {
                renderMainMenu(app);
            } else if (currentView === 'category') {
                renderCategory(app, currentCategory);
            } else if (currentView === 'model') {
                renderModel(app, currentCategory, currentModel);
            }
        }

        function renderMainMenu(app) {
            const categoriesList = Object.entries(categories);
            
            let html = `
                <div class="header">
                    <h1>📁 Dreame Каталог</h1>
                    <p>Нажмите на модель, чтобы получить PDF в чат</p>
                </div>
                
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value">${totalCategories}</div>
                        <div class="stat-label">Категорий</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${totalModels}</div>
                        <div class="stat-label">Моделей</div>
                    </div>
                </div>

                <input type="text" class="search-box" placeholder="🔍 Поиск моделей..." 
                       onkeyup="window.searchModels(this.value)" value="${searchQuery}">
                
                <div class="category-grid">
            `;
            
            categoriesList.forEach(([catName, catData]) => {
                const modelCount = catData.models.length;
                html += `
                    <div class="category-card" onclick="window.selectCategory('${catName.replace(/'/g, "\\'")}')">
                        <h3>${catData.icon} ${catName}</h3>
                        <p>
                            <span>${modelCount} моделей</span>
                            <span class="model-count">${modelCount}</span>
                        </p>
                    </div>
                `;
            });
            
            html += `</div>`;
            
            app.innerHTML = html;
        }

        function renderCategory(app, categoryName) {
            const category = categories[categoryName];
            if (!category) return;
            
            let html = `
                <button class="back-button" onclick="window.goBack()">
                    ← Назад к категориям
                </button>
                
                <div class="header">
                    <h1>${category.icon} ${categoryName}</h1>
                    <p>${category.models.length} моделей • нажмите для получения PDF</p>
                </div>

                <input type="text" class="search-box" placeholder="🔍 Поиск в этой категории..." 
                       onkeyup="window.filterModels(this.value)" id="categorySearch">
                
                <div class="models-list" id="modelsContainer">
            `;
            
            category.models.forEach((modelName, index) => {
                html += `
                    <div class="model-item" onclick="window.selectModel('${categoryName.replace(/'/g, "\\'")}', ${index})">
                        ${modelName}
                        <span class="send-icon">📤</span>
                    </div>
                `;
            });
            
            html += `
                </div>
                <div class="footer-nav">
                    <button onclick="window.goBack()">◀️ Назад</button>
                    <button onclick="window.goToMain()">🏠 Главная</button>
                </div>
            `;
            
            app.innerHTML = html;
        }

        function renderModel(app, categoryName, modelIndex) {
            const category = categories[categoryName];
            if (!category) return;
            
            const modelName = category.models[modelIndex];
            
            let html = `
                <button class="back-button" onclick="window.goBack()">
                    ← Назад к моделям
                </button>
                
                <div class="model-detail">
                    <h2>${modelName}</h2>
                    <span class="category-badge">${category.icon} ${categoryName}</span>
                    
                    <button id="pdfRequestButton" class="get-pdf-button" 
                            onclick="window.requestPDFFromBot('${category.folder}', '${modelName.replace(/'/g, "\\'")}', ${modelIndex})">
                        📄 Получить PDF в чат
                    </button>
                    
                    <div style="margin-top: 20px; color: var(--tg-theme-hint-color); font-size: 12px;">
                        PDF будет отправлен в этот чат с ботом
                    </div>
                </div>
                
                <div class="footer-nav">
                    <button onclick="window.goBack()">◀️ Назад</button>
                    <button onclick="window.goToMain()">🏠 Главная</button>
                </div>
            `;
            
            app.innerHTML = html;
        }

        // Поиск по моделям
        function searchModels(query) {
            searchQuery = query.toLowerCase();
            
            if (!searchQuery) {
                render();
                return;
            }
            
            const results = [];
            
            Object.entries(categories).forEach(([catName, catData]) => {
                catData.models.forEach((modelName, index) => {
                    if (modelName.toLowerCase().includes(searchQuery)) {
                        results.push({
                            category: catName,
                            categoryIcon: catData.icon,
                            model: modelName,
                            index: index,
                            folder: catData.folder
                        });
                    }
                });
            });
            
            if (results.length > 0) {
                showSearchResults(results);
            }
        }

        function showSearchResults(results) {
            const app = document.getElementById('app');
            
            let html = `
                <button class="back-button" onclick="window.goToMain()">
                    ← Назад
                </button>
                
                <div class="header">
                    <h1>🔍 Результаты поиска</h1>
                    <p>Найдено: ${results.length}</p>
                </div>
                
                <div class="models-list">
            `;
            
            results.forEach(result => {
                html += `
                    <div class="model-item" onclick="window.selectModel('${result.category.replace(/'/g, "\\'")}', ${result.index})">
                        ${result.categoryIcon} ${result.category} → ${result.model}
                        <span class="send-icon">📤</span>
                    </div>
                `;
            });
            
            html += `</div>`;
            
            app.innerHTML = html;
        }

        function filterModels(query) {
            const searchTerm = query.toLowerCase();
            const container = document.getElementById('modelsContainer');
            if (!container) return;
            
            const models = container.getElementsByClassName('model-item');
            
            Array.from(models).forEach(model => {
                const text = model.textContent.toLowerCase();
                if (text.includes(searchTerm)) {
                    model.style.display = 'flex';
                } else {
                    model.style.display = 'none';
                }
            });
        }

        // Навигационные функции
        function selectCategory(categoryName) {
            currentView = 'category';
            currentCategory = categoryName;
            searchQuery = '';
            render();
            try { tg.HapticFeedback.impactOccurred('light'); } catch(e) {}
        }

        function selectModel(categoryName, modelIndex) {
            currentView = 'model';
            currentCategory = categoryName;
            currentModel = modelIndex;
            render();
            try { tg.HapticFeedback.impactOccurred('medium'); } catch(e) {}
        }

        function goBack() {
            if (currentView === 'model') {
                currentView = 'category';
            } else if (currentView === 'category') {
                currentView = 'main';
            }
            searchQuery = '';
            render();
        }

        function goToMain() {
            currentView = 'main';
            currentCategory = null;
            currentModel = null;
            searchQuery = '';
            render();
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            debugLog('DOM загружен');
            render();
            
            if (tg) {
                tg.ready();
                debugLog('tg.ready() вызван');
            }
            
            // Настраиваем основную кнопку
            if (tg) {
                tg.MainButton.setText('Закрыть');
                tg.MainButton.onClick(() => {
                    tg.close();
                });
                debugLog('MainButton настроен');
            }
        });

        // Делаем функции глобальными
        window.selectCategory = selectCategory;
        window.selectModel = selectModel;
        window.goBack = goBack;
        window.goToMain = goToMain;
        window.requestPDFFromBot = requestPDFFromBot;
        window.searchModels = searchModels;
        window.filterModels = filterModels;
        window.toggleDebug = toggleDebug;
        window.debugLog = debugLog;
    </script>
</body>
</html>
